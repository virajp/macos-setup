# .prettierrc.yaml
---
overrides:
  - files:
      - "*.md"
      - "*.markdown"
    options:
      parser: markdown
      proseWrap: always
      # Match markdownlint expectations
      printWidth: 80
      # Tab settings
      useTabs: false
      tabWidth: 2
      # Ensure consistent list markers
      singleQuote: false

  - files:
      - "*.yaml"
      - "*.yml"
    options:
      parser: yaml
      # Tab settings
      useTabs: false
      tabWidth: 2
