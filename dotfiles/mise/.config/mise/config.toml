[settings]
all_compile = false
gpg_verify = true
os = "macos"
paranoid = true
trusted_config_paths = ["~/.config/mise", "~/Projects"]

[tools]
usage = { version = "latest" }
node = { version = "latest", postinstall = "npm uninstall --global npm" }
pnpm = { version = "latest" }
"npm:oh-my-claude-sisyphus" = { version = "latest" }
doppler = { version = "latest" }
gcloud = { version = "latest" }
firebase = { version = "latest" }
gitleaks = { version = "latest" }
pre-commit = { version = "latest" }

[tasks.init]
hide = true
description = "Mark all files as executables"
run = "find ~/.config/mise/tasks/ -name '*' -type f -exec chmod 755 {} \\;"

[shell_alias]
updateall = "mise run updateall"
