[settings]
all_compile          = false
env_shell_expand     = true
gpg_verify           = true
os                   = "macos"
paranoid             = true
trusted_config_paths = [ "~/.config/mise", "~/Projects" ]

[tools]
fnox  = { version = "latest" }
usage = { version = "latest" }

# AI Tools
claude-code        = { version = "latest" }
jq                 = { version = "latest" }
node               = { postinstall = "npm uninstall --global npm", version = "latest" }
"npm:ccstatusline" = { version = "latest" }
"pipx:graphifyy"   = { uvx = true, version = "latest" }
python             = { version = "latest" }
uv                 = { version = "latest" }

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tasks.init]
description = "Mark all files as executables"
hide        = true
run         = "find ~/.config/mise/tasks/ -name '*' -type f -exec chmod 755 {} \\;"

[shell_alias]
cleanupDS          = "mise run cleanupDS"
cleanupDS-Projects = "mise run cleanupDS ~/Projects"
cleanupTelegram    = "mise run cleanupTelegram"
osx-upgrade        = "mise run upgrade:macos:upgrade"
updateall          = "mise run updateall"

# AI Tools shortcuts
aistats = "bunx codeburn"
cc      = "claude --allow-dangerously-skip-permissions"

# Development related shortcuts
code = "mise run --silent func:code"

# Startup, Services and Process related shortcuts
listServices     = "launchctl list | grep -v '^-' | sort -n | grep -v 'com.apple'"
listStartupItems = "mise run func:listStartupItems"
myps             = "mise run func:myps"

# IP related shortcuts
gateway  = "mise run ips:gateway"
ii       = "mise run ips:ii"
ips      = "mise run ips:ips"
ipv4     = "mise run ips:ipv4"
ipv6     = "mise run ips:ipv6"
remoteip = "mise run ips:remoteip"

# Backup shortcuts
# backup = "mise run func:backup"
# zipf = "mise run func:zip"

# Generic Aliases
adb             = "$ANDROID_HOME/platform-tools/adb"
cancelPrintJobs = "sudo cancel -a -x"
cat             = "bat"
cd              = "z"
cdcd            = "cd '$CLOUD_PATH'"
cdgh            = "cd '$HOME/Projects/github.com'"
cls             = "clear"
diff            = "diff-so-fancy"
dig             = "doggo"
dns             = "scutil --dns"
edit            = "subl"
emulator        = "$ANDROID_HOME/emulator/emulator"
f               = "flutter"
findPid         = "lsof -t -c"
finder          = "open -a Finder ./"
flushdns        = "dscacheutil -flushcache"
hping           = "httping --ts -GBbXsSYaWZvv"
ipInfo0         = "ipconfig getpacket en0"
ld              = "ls --only-dirs"
lf              = "ls --only-files"
lg              = "ls --git-ignore"
ls              = "eza --icons --color=always --color-scale --group-directories-first --classify=always --long --grid --all --modified --git --header --width=1 --links"
openports       = "sudo lsof -i -P | grep LISTEN"
ping            = "prettyping -i 2 --nolegend"
plist           = "plutil -p"
reload          = "exec fish"
routes          = "netstat -nr -f inet"
tf              = "terraform"
tree            = "ls --tree"

# Git Related Aliases
gc    = 'git commit -a -m'
gp    = 'git push --all --atomic --verbose'
gpull = 'git pull --all --verbose --progress'
gs    = 'git status -sb'

# Docker Related Aliases
dclean = "docker system prune --all --volumes --force"
dlist  = "docker image list"
dprune = "docker system prune --volumes --force"
dpull  = "docker image pull --platform='linux/amd64'"
drun   = "docker run --platform='linux/amd64' --rm --interactive --tty"

# Kubernetes (K8s) Related Aliases
k        = "kubectl"
kc-local = "kubectl config use-context orbstack"
kgc      = "kubectl config current-context"

# 95octane Related Customisations
cd95 = "cd $HOME/Projects/github.com/95octane"

[env]
# fnox plugin
_.fnox-env = { tools = true }

# GCP related
USE_GKE_GCLOUD_AUTH_PLUGIN = { tools = true, value = "true" }

# Development tools
NODE_ENV    = "development"
RUNTIME_ENV = "development"
