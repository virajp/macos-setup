# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 4

final_space: true
enable_cursor_positioning: true
shell_integration: true
async: false

upgrade:
  auto: false
  notice: false

palette:
  white: "#fbf1c7"
  grey: "#3c3836"
  bg3: "#665c54"
  blue: "#458588"
  aqua: "#689d6a"
  green: "#98971a"
  orange: "#d65d0e"
  purple: "#b16286"
  red: "#cc241d"
  yellow: "#d79921"
  error: "#e91e63"
  bright: "#00ff00"

blocks:
  - type: prompt
    alignment: left
    newline: false
    filler: .
    force: true

    segments:
      - type: claude
        style: diamond
        leading_diamond: 
        trailing_diamond: 
        background: p:orange
        foreground: p:white
        # template: " \udb82\udfc9 {{ .Model.DisplayName }} \uf2d0 {{ .Workspace.CurrentDir }} \uf2d0 {{ .TokenUsagePercent.Gauge }}"
        template: " {{ .Model.DisplayName }} "

      - type: claude
        style: diamond
        trailing_diamond: 
        background: p:aqua
        foreground: p:white
        template: " \uf2d0 {{ .TokenUsagePercent.Gauge }} "

      - type: git
        style: diamond
        trailing_diamond: 
        background: p:aqua
        foreground: p:white
        background_templates:
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}p:red{{ end }}"
          - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}"
          - "{{ if gt .Ahead 0 }}p:red{{ end }}"
          - "{{ if gt .Behind 0 }}p:red{{ end }}"
        template:
          " {{ .HEAD }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and
          (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} 
          {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{
          end }} "
        options:
          fetch_status: true
          fetch_upstream_icon: true

      - type: path
        template: " {{ .Path }} "
        style: diamond
        trailing_diamond: 
        background: p:purple
        foreground: p:white
        options:
          style: full
          home_icon: ""
          folder_separator_icon: ""
          mapped_locations_enabled: true
          mapped_locations:
            ~/Projects/github.com: " "
            ~/Projects/gitlab.com: " "
            ~/Projects/local: "󰇄 "
            ~/Documents: "󰈙 "
            ~/Downloads: " "
            ~/Music: "󰝚 "
            ~/Pictures: " "
