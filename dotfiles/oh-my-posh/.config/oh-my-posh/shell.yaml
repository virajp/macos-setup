# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

# Reference: https://www.nerdfonts.com/cheat-sheet

version: 4

final_space: true
enable_cursor_positioning: true
shell_integration: true
async: false

upgrade:
  auto: false
  notice: false

palette:
  white: "#fbf1c7"
  grey: "#3c3836"
  bg3: "#665c54"
  blue: "#458588"
  aqua: "#689d6a"
  green: "#98971a"
  orange: "#d65d0e"
  purple: "#b16286"
  red: "#cc241d"
  yellow: "#d79921"
  error: "#e91e63"
  bright: "#00ff00"

# var:
#   GCP_REGION: "{{ env.GCP_REGION }}"

blocks:
  - type: prompt
    alignment: left
    newline: true
    filler: .
    force: true

    segments:
      - type: os
        style: diamond
        leading_diamond: "╭─"
        trailing_diamond: ""
        background: p:orange
        foreground: p:white
        template: " {{ .Icon }}"

      - type: time
        style: diamond
        trailing_diamond: ""
        background: p:orange
        foreground: p:white
        template: "{{ .CurrentDate | date .Format }} "
        options:
          time_format: "Mon 3:04pm"

      - type: git
        style: diamond
        trailing_diamond: ""
        background: p:aqua
        foreground: p:white
        template:
          " {{ .HEAD }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and
          (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} 
          {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{
          end }} "
        background_templates:
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}p:red{{ end }}"
          - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}"
          - "{{ if gt .Ahead 0 }}p:red{{ end }}"
          - "{{ if gt .Behind 0 }}p:red{{ end }}"
        options:
          fetch_status: true
          fetch_upstream_icon: true

      - type: path
        style: diamond
        trailing_diamond: ""
        background: p:green
        foreground: p:white
        template: " {{ .Path }} "
        options:
          style: agnoster
          folder_separator_icon: "  "
          folder_icon: ""
          home_icon: ""
          mapped_locations_enabled: true
          mapped_locations:
            ~/Projects/github.com: " "
            ~/Projects/gitlab.com: " "
            ~/Projects/local: "󰇄 "
            ~/Documents: "󰈙 "
            ~/Downloads: " "
            ~/Music: "󰝚 "
            ~/Pictures: " "

      - type: python
        style: diamond
        trailing_diamond: ""
        background: p:aqua
        foreground: p:white
        template: "  {{ .Full }} "
        options:
          display_mode: files
          tooling:
            - uv
          folders:
            - .venv
          extensions:
            - pyproject.toml
            - uv.lock

      - type: node
        style: diamond
        trailing_diamond: ""
        background: p:aqua
        foreground: p:white
        template: " 󰎙 {{ .Full }} "

      - type: go
        style: diamond
        trailing_diamond: ""
        background: p:aqua
        foreground: p:white
        template: "  {{ .Full }} "

      - type: gcp
        style: diamond
        trailing_diamond: ""
        background: p:orange
        foreground: p:white
        template: "  {{.Project}} "
        options:
          display_project: true
          display_region: true
          display_zone: false

      - type: executiontime
        style: diamond
        trailing_diamond: ""
        background: p:grey
        foreground: p:white
        template: " {{ .FormattedMs }} "
        options:
          always_enabled: true

      - type: status
        style: diamond
        trailing_diamond: ""
        background: p:green
        foreground: p:white
        template: " {{ if .Error }}\uf071{{ else }}\uf00c{{ end }} "
        background_templates:
          - "{{ if .Error }}p:error{{ end }}"
        options:
          always_enabled: true

  - type: prompt
    alignment: left
    newline: true

    segments:
      - type: text
        style: plain
        background: transparent
        foreground: p:bright
        template: "╰─"
