"$schema" = 'https://starship.rs/config-schema.json'

# WHY: Custom multi-segment format with gruvbox-inspired colors
# Features: OS icon, time, git status, directory with substitutions, language versions, k8s context
format = """
[ŅéČ](color_orange)\
$os$time\
[Ņé░](fg:color_orange bg:color_aqua)\
$git_branch\
$git_status\
[Ņé░](bg:color_yellow fg:color_aqua)\
$directory\
[Ņé░](fg:color_yellow bg:color_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](bg:color_aqua fg:color_blue)\
$kubernetes\
[Ņé░](bg:color_red fg:color_aqua)\
$cmd_duration\
[Ņé░](fg:color_red)\

$line_break\
$character\
"""

# WHY: Empty right format to keep prompt clean
right_format="""
"""

# WHY: Custom color palette inspired by gruvbox theme
