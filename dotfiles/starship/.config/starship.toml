"$schema" = 'https://starship.rs/config-schema.json'

# WHY: Custom multi-segment format with gruvbox-inspired colors
# Features: OS icon, time, git status, directory with substitutions, language versions, k8s context
format = """
[](color_orange)\
$os$time\
[](fg:color_orange bg:color_aqua)\
$git_branch\
$git_status\
[](bg:color_yellow fg:color_aqua)\
$directory\
[](fg:color_yellow bg:color_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](bg:color_aqua fg:color_blue)\
$kubernetes\
[](bg:color_red fg:color_aqua)\
$cmd_duration\
[](fg:color_red)\

$line_break\
$character\
"""

# WHY: Empty right format to keep prompt clean
right_format = ""

# WHY: Custom color palette inspired by gruvbox theme
palette = 'viraj_dark'
continuation_prompt = ' '
# WHY: Higher timeout for slow git operations
command_timeout = 500
add_newline = true

[palettes.viraj_dark]
color_white = '#fbf1c7'
color_grey = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_white"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:color_orange fg:color_white"
style_root = "bg:color_orange fg:color_white"
format = '[ $user ]($style)'

[directory]
style = "fg:color_white bg:color_yellow"
format = "[ $path ]($style)"
home_symbol = " 🏠 "
truncate_to_repo = false
truncation_length = 4
truncation_symbol = "… /"
use_os_path_sep = true
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = " 󰈙 "
"Downloads" = "  "
"Music" = " 󰝚 "
"Pictures" = "  "
"Developer" = " 󰨞 "
"github.com" = " 󰊤 "
"Projects" = " 󰉋 "
"gitlab.com" = " 󰮠 "
"bitbucket.org" = " 󰂨 "
"cloudflare.com" = " 󰅟 "
"google.com" = " 󰊭 "
"microsoft.com" = " 󰍲 "
"apple.com" = " 󰀵 "

[cmd_duration]
style = "bg:color_red"
min_time = 0
format = '[[ $duration ](fg:color_white $style)]($style)'

[git_branch]
# Symbol for Git
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_white bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_white bg:color_aqua)]($style)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[c]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[java]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[kotlin]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'

[docker_context]
disabled = true
symbol = ""
style = "bg:color_white fg:color_aqua"
format = '[[ $symbol( $context) ](fg:color_white bg:color_aqua)]($style)'

[kubernetes]
disabled = false
symbol = "☸"
style = "bg:color_white fg:color_aqua"
format = '[[ $symbol( $context) ](fg:color_white bg:color_aqua)]($style)'
# namespaces = ["default", "kube-system", "kube-public", "kube-node-lease"]

[gcloud]
disabled = true
symbol = "☁️"
# symbol = "🇬️"
style = "bg:color_red"
# format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'
format = '[[ $symbol $project ](fg:color_white bg:color_red)]($style)'

[time]
disabled = false
# time_format = "%a, %e %b, %l:%M%P"
time_format = "%l:%M%P"
use_12hr = true
style = "bg:color_orange"
format = '[[ $time ](fg:color_white bg:color_orange)]($style)'

[line_break]
disabled = false

[character]
disabled = false
format = '$symbol '
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
# success_symbol = '[](bold fg:color_green)'
# error_symbol = '[✗](bold fg:color_red)'
