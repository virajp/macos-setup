# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Custom multi-segment format with gruvbox-inspired colors
# Features: OS icon, time, git status, directory with substitutions, language versions, k8s context

format = """
[╭─](color_orange)\
$os$time\
[](fg:color_orange bg:color_aqua)\
$git_branch\
$git_status\
[](bg:color_yellow fg:color_aqua)\
$directory\
[](fg:color_yellow bg:color_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$dart\
[](bg:color_aqua fg:color_blue)\
$gcloud\
[](bg:color_red fg:color_aqua)\
$cmd_duration\
[](fg:color_red)\
$status\

$line_break\
$character\
"""

# Empty right format to keep prompt clean
right_format = ""

# Custom color palette inspired by gruvbox theme
continuation_prompt = ' '
palette             = 'viraj_dark'
# Higher timeout for slow git operations
add_newline     = true
command_timeout = 2000

[palettes.viraj_dark]
color_aqua   = '#689d6a'
color_bg3    = '#665c54'
color_blue   = '#458588'
color_green  = '#98971a'
color_grey   = '#3c3836'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red    = '#cc241d'
color_white  = '#fbf1c7'
color_yellow = '#d79921'

[os]
disabled = false
style    = "bg:color_orange fg:color_white"

[os.symbols]
Alpine           = ""
Amazon           = ""
Android          = ""
Arch             = "󰣇"
Artix            = "󰣇"
CentOS           = ""
Debian           = "󰣚"
Fedora           = "󰣛"
Gentoo           = "󰣨"
Linux            = "󰌽"
Macos            = "󰀵"
Manjaro          = ""
Mint             = "󰣭"
Raspbian         = "󰐿"
RedHatEnterprise = "󱄛"
Redhat           = "󱄛"
SUSE             = ""
Ubuntu           = "󰕈"
Windows          = "󰍲"

[username]
format      = '[ $user ]($style)'
show_always = true
style_root  = "bg:color_orange fg:color_white"
style_user  = "bg:color_orange fg:color_white"

[directory]
format            = "[ $path ]($style)"
home_symbol       = " 🏠 "
read_only         = " 󰌾"
read_only_style   = "red"
style             = "fg:color_white bg:color_yellow"
truncate_to_repo  = false
truncation_length = 4
truncation_symbol = "… /"
use_logical_path  = true
use_os_path_sep   = false

[directory.substitutions]
"Developer"           = " 󰨞 "
"Documents"           = " 󰈙 "
"Downloads"           = "  "
"Music"               = " 󰝚 "
"Pictures"            = "  "
"Projects"            = " 󰉋 "
"Projects/github.com" = " 󰊤 "
"apple.com"           = " 󰀵 "
"bitbucket.org"       = " 󰂨 "
"cloudflare.com"      = " 󰅟 "
"gitlab.com"          = " 󰮠 "
"google.com"          = " 󰊭 "
"microsoft.com"       = " 󰍲 "

[cmd_duration]
format   = '[[ $duration ](fg:color_white $style)]($style)'
min_time = 0
style    = "bg:color_red"

[git_branch]
# Symbol for Git
format = '[[ $symbol $branch ](fg:color_white bg:color_aqua)]($style)'
style  = "bg:color_aqua"
symbol = ""

[git_status]
format            = '[[($all_status$ahead_behind )](fg:color_white bg:color_aqua)]($style)'
ignore_submodules = false
style             = "bg:color_aqua"

[nodejs]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[dart]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[c]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[rust]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[golang]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[php]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[java]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[kotlin]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[haskell]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[python]
format = '[[ $symbol( $version) ](fg:color_white bg:color_blue)]($style)'
style  = "bg:color_blue"

[docker_context]
disabled = true
format   = '[[ $symbol( $context) ](fg:color_white bg:color_aqua)]($style)'
style    = "bg:color_white fg:color_aqua"

[kubernetes]
disabled = false
format   = '[[ $symbol( $context) ](fg:color_white bg:color_aqua)]($style)'
style    = "bg:color_white fg:color_aqua"
# namespaces = ["default", "kube-system", "kube-public", "kube-node-lease"]

[gcloud]
disabled = false
format   = '[[ $symbol $project ](fg:color_white bg:color_aqua)]($style)'
style    = "bg:color_red"
symbol   = ""

[time]
disabled    = false
format      = '[[ $time ](fg:color_white bg:color_orange)]($style)'
style       = "bg:color_orange"
time_format = "%a %l:%M%P"
use_12hr    = true

[line_break]
disabled = false

[status]
disabled   = false
format     = ' [$symbol]($style)'
map_symbol = true

[character]
disabled       = false
error_symbol   = '[╰─❯](bold red)'
format         = '$symbol '
success_symbol = '[╰─❯](bold green)'
