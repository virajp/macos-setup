default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase
      - id: check-merge-conflict
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase
      - id: detect-private-key
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase
      - id: end-of-file-fixer
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase
      - id: trailing-whitespace
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase
      - id: check-added-large-files
        args: ["--maxkb=1024"]
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase
      - id: check-symlinks
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase

  - repo: local
    hooks:
      - id: block-local-identity-configs
        name: Block local user and signing overrides
        description: Prevents local .git/config from overriding global user and signing settings.
        entry: |
          bash -c '
            FORBIDDEN="user\.name|user\.email|user\.signingkey|commit\.gpgsign|tag\.gpgsign|gpg\.format|gpg\.program|gpg\.ssh\.program";
            LOCAL_CONFIG=$(git config --local --list | grep -E "^($FORBIDDEN)=");
            if [ ! -z "$LOCAL_CONFIG" ]; then
              echo "Error: Forbidden local git configurations detected:";
              echo "$LOCAL_CONFIG";
              echo "Please remove these from .git/config and use --global settings instead.";
              exit 1;
            fi'
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: local-run-prettier
        name: prettier format (md,yaml,yml)
        entry: npx prettier --config ./.prettierrc.yaml --check --write
        files: \.(md|yaml|yml)$
        language: system
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase

  - repo: local
    hooks:
      - id: local-run-markdownlint
        name: markdown linter (md)
        entry: npx markdownlint-cli2 --fix --format
        files: \.md$
        language: system
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks-scan
        args: [--config, ./.gitleaks.toml]
        stages: [pre-commit] # Ensure it only runs during the pre-commit phase

  - repo: https://github.com/qoomon/git-conventional-commits
    rev: v2.7.2
    hooks:
      - id: conventional-commits
