# .markdownlint.yaml
---
# MD001: heading-increment - disabled, Prettier doesn't enforce
MD001: true

# MD003: heading-style - consistent style
MD003: true

# MD004: ul-indent - list indentation
MD004: true

# MD005: list-indent - consistent indentation
MD005: true

# MD007: ul-indent - list items
MD007:
  indent: 2
  start_indented: false

# MD009: no-trailing-spaces
MD009: true

# MD010: no-hard-tabs
MD010: true

# MD011: no-reversed-links
MD011: true

# MD012: no-multiple-blanks - limit blank lines
MD012: true

# MD013: line-length
MD013:
  line_length: 80
  code_blocks: false
  tables: false
  headings: false # optional, headings rarely benefit from wrapping either

# MD014: commands-show-output
MD014: true

# MD018: no-missing-space-atx
MD018: true

# MD019: no-multiple-space-atx
MD019: true

# MD020: no-missing-space-link
MD020: true

# MD021: no-multiple-space-link
MD021: true

# MD022: blanks-around-headings
MD022:
  lines_above: 1
  lines_below: 1

# MD024: no-duplicate-heading
MD024:
  siblings_only: true

# MD025: single-title
MD025:
  front_matter_title: ""

# MD026: no-trailing-punctuation
MD026:
  punctuation: ".,;:!?"

# MD027: no-multiple-spaces-blockquote
MD027: true

# MD028: no-blanks-blockquote
MD028: true

# MD029: ol-prefix
MD029:
  style: ordered

# MD030: list-marker-space
MD030:
  ul_single: 1
  ol_single: 1
  ul_multi: 1
  ol_multi: 1

# MD031: blanks-around-fences
MD031:
  list_items: true

# MD032: blanks-around-lists
MD032: true

# MD033: no-inline-html
MD033:
  allowed_elements: []

# MD034: no-bare-urls
MD034: true

# MD035: hr-style
MD035:
  style: consistent

# MD036: no-emphasis-as-heading
MD036: true

# MD037: no-space-in-emphasis
MD037: true

# MD038: no-space-in-code
MD038: true

# MD039: no-space-in-link-text
MD039: true

# MD040: fenced-code-language - CRITICAL: require language specifier
MD040: true

# MD041: first-line-heading
MD041:
  level: 1

# MD042: no-empty-links
MD042: true

# MD043: required-headings
MD043: false

# MD044: proper-names
MD044: false

# MD045: image-alt-text
MD045: true

# MD046: code-block-style
MD046:
  style: fenced

# MD047: single-trailing-newline
MD047: true

# MD048: code-fence-style
MD048:
  style: backtick

# MD049: emphasis-style
MD049:
  style: consistent

# MD050: strong-style
MD050:
  style: consistent

MD060:
  aligned_delimiter: true
  style: aligned
